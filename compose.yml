services:
  web:
    image: ghcr.io/zeecka/aperisolve:latest
    #build: .
    container_name: aperisolve-web
    restart: always
    ports:
      - "${WEB_APP_PORT:-5000}:5000"
    volumes:
      - apresults:/app/aperisolve/results
    depends_on:
      postgres:
        condition: service_healthy
      initdb:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    env_file:
      - .env
    healthcheck:
      # Read-only probe: urlopen raises (non-zero exit) on connection failure
      # or HTTP >= 400. curl is not installed in the image.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/', timeout=10)"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s

  worker:
    image: ghcr.io/zeecka/aperisolve:latest
    #build: .
    container_name: aperisolve-worker
    restart: always
    command: rq worker default --url redis://redis:6379/0
    # Analyzers (binwalk, foremost, ...) process untrusted input; cap the
    # blast radius of a decompression bomb or runaway tool.
    mem_limit: 2g
    cpus: 2
    volumes:
      - apresults:/app/aperisolve/results
    depends_on:
      postgres:
        condition: service_healthy
      initdb:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - .env

  cron:
    image: ghcr.io/zeecka/aperisolve:latest
    #build: .
    container_name: aperisolve-cron
    restart: always
    command: rq cron aperisolve.cron --url redis://redis:6379/0
    volumes:
      - apresults:/app/aperisolve/results
    depends_on:
      postgres:
        condition: service_healthy
      initdb:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - .env

  initdb:
    image: ghcr.io/zeecka/aperisolve:latest
    #build: .
    container_name: aperisolve-initdb
    command: python -m aperisolve.utils.init_db
    volumes:
      - apresults:/app/aperisolve/results
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    restart: "no"

  postgres:
    image: postgres:18
    container_name: postgres
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aperiuser -d aperisolve"]
      interval: 5s
      timeout: 5s
      retries: 5
    env_file:
      - .env

  redis:
    image: redis:7
    container_name: redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    env_file:
      - .env

  rqdashboard:
    image: eoranged/rq-dashboard
    container_name: rq-dashboard
    restart: always
    ports:
      # Loopback only: RQ Dashboard has no auth and lets anyone requeue or
      # delete jobs. Reach it over SSH tunnelling.
      - "127.0.0.1:9181:9181"
    depends_on:
      - redis
    env_file:
      - .env

volumes:
  apresults:
  pgdata:
